services:
  - type: web
    name: aegis-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString

databases:
  - name: aegis-db
    databaseName: aegis
    user: aegis_admin
    region: ohio
    plan: free
